
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado CFC - Prova 16</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .nav-header { max-width: 800px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-home { text-decoration: none; color: var(--primary); font-weight: 600; padding: 8px 16px; border: 1px solid var(--primary); border-radius: 6px; transition: 0.2s; }
        .btn-home:hover { background: var(--primary); color: white; }
        .card { background: white; max-width: 800px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .q-block { margin-bottom: 25px; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .q-block.correct { border-left: 6px solid var(--success); background: #f0fdf4; }
        .q-block.wrong { border-left: 6px solid var(--danger); background: #fef2f2; }
        .options label { display: block; margin: 10px 0; padding: 10px; background: #f1f5f9; border-radius: 6px; cursor: pointer; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="btn-home">🏠 Início / Dashboard</a>
        <span>Simulado #16</span>
    </div>
    <div class="card">
        <h2 style="margin-top:0">Exame de Suficiência CFC</h2>
        <div id="quiz"></div>
        <button class="btn-submit" onclick="corrigir()">Corrigir Agora</button>
    </div>
    <script>
        const data = [{'q': 'O registro de receitas e despesas no período em que ocorrem, independente de recebimento, refere-se ao regime de:', 'a': 'Caixa.', 'b': 'Competência.', 'c': 'Prudência.', 'd': 'Essência sobre a forma.', 'r': 'B'}, {'q': 'Na DFC, a compra de máquinas para uso da fábrica é uma atividade de:', 'a': 'Operação.', 'b': 'Financiamento.', 'c': 'Investimento.', 'd': 'Reserva.', 'r': 'C'}, {'q': 'O Ponto de Equilíbrio Contábil é atingido quando:', 'a': 'A Receita Total é zero.', 'b': 'A Margem de Contribuição Total iguala os Custos e Despesas Fixas.', 'c': 'O Lucro é máximo.', 'd': 'Os Custos Variáveis são maiores que os Fixos.', 'r': 'B'}, {'q': 'De acordo com a NBC TG 26, o conjunto completo de demonstrações contábeis inclui:', 'a': 'Balanço Patrimonial, DRE, DMPL, DFC, DVA (se aberta) e Notas Explicativas.', 'b': 'Apenas Balanço e DRE.', 'c': 'Balanço, DRE e Relatório da Administração.', 'd': 'Balanço, DRE e DOAR.', 'r': 'A'}, {'q': 'Contas redutoras do Ativo (como Depreciação Acumulada) possuem natureza:', 'a': 'Devedora.', 'b': 'Credora.', 'c': 'Mista.', 'd': 'Patrimonial neutra.', 'r': 'B'}];
        const container = document.getElementById('quiz');
        data.forEach((q, i) => {
            container.innerHTML += `
                <div class="q-block" id="b${i}">
                    <p><strong>${i+1}.</strong> ${q.q}</p>
                    <div class="options">
                        <label><input type="radio" name="r${i}" value="A"> A) ${q.a}</label>
                        <label><input type="radio" name="r${i}" value="B"> B) ${q.b}</label>
                        <label><input type="radio" name="r${i}" value="C"> C) ${q.c}</label>
                        <label><input type="radio" name="r${i}" value="D"> D) ${q.d}</label>
                    </div>
                </div>`;
        });
        function corrigir() {
            data.forEach((q, i) => {
                const sel = document.querySelector(`input[name="r${i}"]:checked`);
                const block = document.getElementById(`b${i}`);
                if(sel && sel.value === q.r) block.className = "q-block correct";
                else block.className = "q-block wrong";
            });
            window.scrollTo(0,0);
            alert("Correção finalizada!");
        }
    </script>
</body>
</html>
